<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Investment Sync Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com" rel="stylesheet">
    <style>
        body { font-family: 'Kanit', sans-serif; background-color: #f1f5f9; }
        .loading { opacity: 0.5; pointer-events: none; }
    </style>
</head>
<body class="p-4 md:p-8">
    <div class="max-w-5xl mx-auto">
        <div class="flex justify-between items-center mb-8">
            <h1 class="text-3xl font-bold text-slate-800">🌐 My Cloud Invest</h1>
            <div id="status" class="text-xs text-slate-400">เชื่อมต่อแล้ว</div>
        </div>
        
        <!-- Summary Dashboard -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-8">
            <div class="bg-white p-6 rounded-2xl shadow-sm border-l-4 border-blue-500">
                <p class="text-gray-500 text-sm">ทุนล่าสุด</p>
                <h2 id="displayCap" class="text-2xl font-bold text-slate-800">฿0</h2>
            </div>
            <div class="bg-white p-6 rounded-2xl shadow-sm border-l-4 border-emerald-500">
                <p class="text-gray-500 text-sm">กำไรสะสมรวม</p>
                <h2 id="displayProfit" class="text-2xl font-bold text-emerald-600">฿0</h2>
            </div>
        </div>

        <!-- Input Form -->
        <div class="bg-white p-6 rounded-2xl shadow-md mb-8" id="inputForm">
            <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
                <div>
                    <label class="block text-sm text-gray-600 mb-1">วันที่</label>
                    <input type="date" id="inputDate" class="w-full p-2 border rounded-lg outline-none">
                </div>
                <div>
                    <label class="block text-sm text-gray-600 mb-1">เงินทุน</label>
                    <input type="number" id="inputCap" class="w-full p-2 border rounded-lg outline-none" placeholder="0">
                </div>
                <div>
                    <label class="block text-sm text-gray-600 mb-1">กำไร/ขาดทุน</label>
                    <input type="number" id="inputProfit" class="w-full p-2 border rounded-lg outline-none" placeholder="ติดลบใส่ -">
                </div>
                <div class="flex items-end">
                    <button id="saveBtn" onclick="addData()" class="w-full bg-blue-600 text-white py-2 rounded-lg font-semibold hover:bg-blue-700 transition">บันทึกส่ง Google</button>
                </div>
            </div>
        </div>

        <!-- Table -->
        <div class="bg-white rounded-2xl shadow-lg overflow-hidden">
            <table class="w-full text-left">
                <thead class="bg-slate-800 text-white text-sm">
                    <tr>
                        <th class="p-4">วันที่</th>
                        <th class="p-4 text-right">เงินทุน</th>
                        <th class="p-4 text-right">กำไร/ขาดทุน</th>
                        <th class="p-4 text-right">ยอดคงเหลือ</th>
                    </tr>
                </thead>
                <tbody id="tableBody" class="divide-y divide-slate-100">
                    <tr><td colspan="4" class="p-10 text-center text-slate-400">กำลังโหลดข้อมูลจาก Google Sheets...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        // *** สำคัญ: เอา URL ที่ได้จาก Google Apps Script มาวางตรงนี้ ***
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbycfWnSzeFb2wJeuuGicErB3vkeCD4uG-jkQwzSBmPbIoVGPqa4kjsPd-22f15Jm8eg/exec"; 

        document.getElementById('inputDate').valueAsDate = new Date();

        // 1. ดึงข้อมูลจาก Google Sheets มาแสดง
        async function loadData() {
            try {
                const response = await fetch(SCRIPT_URL);
                const data = await response.json();
                renderTable(data);
            } catch (error) {
                console.error("Error:", error);
                document.getElementById('tableBody').innerHTML = `<tr><td colspan="4" class="p-10 text-center text-red-500">โหลดข้อมูลไม่สำเร็จ ตรวจสอบ URL SCRIPT</td></tr>`;
            }
        }

        // 2. บันทึกข้อมูลใหม่ลง Google Sheets
        async function addData() {
            const date = document.getElementById('inputDate').value;
            const cap = document.getElementById('inputCap').value;
            const profit = document.getElementById('inputProfit').value;

            if (!date || cap === "" || profit === "") return alert("กรุณากรอกข้อมูลให้ครบ");

            const btn = document.getElementById('saveBtn');
            const form = document.getElementById('inputForm');
            
            btn.innerText = "กำลังบันทึก...";
            form.classList.add('loading');

            try {
                await fetch(SCRIPT_URL, {
                    method: "POST",
                    body: JSON.stringify({ date, cap, profit })
                });
                
                document.getElementById('inputProfit').value = '';
                await loadData(); // โหลดข้อมูลใหม่มาโชว์
            } catch (e) {
                alert("บันทึกไม่สำเร็จ");
            } finally {
                btn.innerText = "บันทึกส่ง Google";
                form.classList.remove('loading');
            }
        }

        // 3. แสดงผลตารางและสรุปผล
        function renderTable(data) {
            const tableBody = document.getElementById('tableBody');
            tableBody.innerHTML = '';
            let totalProfit = 0;
            let lastCap = 0;

            // เรียงวันที่ล่าสุดขึ้นก่อน
            data.sort((a, b) => new Date(b[0]) - new Date(a[0]));

            data.forEach((rowArr, index) => {
                const [date, cap, profit] = rowArr;
                const capVal = parseFloat(cap);
                const profitVal = parseFloat(profit);
                const balance = capVal + profitVal;
                
                totalProfit += profitVal;
                if(index === 0) lastCap = capVal;

                const tr = document.createElement('tr');
                const pClass = profitVal >= 0 ? 'text-emerald-600' : 'text-red-600';

                tr.innerHTML = `
                    <td class="p-4 text-slate-600">${date}</td>
                    <td class="p-4 text-right font-medium">฿${capVal.toLocaleString()}</td>
                    <td class="p-4 text-right font-bold ${pClass}">${profitVal > 0 ? '+' : ''}${profitVal.toLocaleString()}</td>
                    <td class="p-4 text-right font-bold text-slate-800">฿${balance.toLocaleString()}</td>
                `;
                tableBody.appendChild(tr);
            });

            document.getElementById('displayCap').innerText = `฿${lastCap.toLocaleString()}`;
            document.getElementById('displayProfit').innerText = `฿${totalProfit.toLocaleString()}`;
        }

        // โหลดข้อมูลทันทีที่เปิดเว็บ
        loadData();
    </script>
</body>
</html>
