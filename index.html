<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>บันทึกการลงทุน</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com" rel="stylesheet">
    <style>
        body { font-family: 'Kanit', sans-serif; background-color: #f1f5f9; }
        .loading { opacity: 0.5; pointer-events: none; }
    </style>
</head>
<body class="p-4 md:p-8">
    <div class="max-w-5xl mx-auto">
        <h1 class="text-3xl font-bold text-slate-800 mb-8">📊 บันทึกการลงทุน</h1>
        
        <!-- Dashboard -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-8">
            <div class="bg-white p-6 rounded-2xl shadow-sm border-l-4 border-blue-500">
                <p class="text-gray-500 text-sm">ทุนล่าสุด</p>
                <h2 id="displayCap" class="text-2xl font-bold text-slate-800">฿0</h2>
            </div>
            <div class="bg-white p-6 rounded-2xl shadow-sm border-l-4 border-emerald-500">
                <p class="text-gray-500 text-sm">กำไรสะสมรวม</p>
                <h2 id="displayProfit" class="text-2xl font-bold text-emerald-600">฿0</h2>
            </div>
        </div>

        <!-- Form -->
        <div class="bg-white p-6 rounded-2xl shadow-md mb-8" id="inputForm">
            <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
                <div><label class="block text-sm text-gray-600 mb-1">วันที่</label>
                <input type="date" id="inputDate" class="w-full p-2 border rounded-lg outline-none"></div>
                <div><label class="block text-sm text-gray-600 mb-1">เงินทุน</label>
                <input type="number" id="inputCap" class="w-full p-2 border rounded-lg outline-none" placeholder="0"></div>
                <div><label class="block text-sm text-gray-600 mb-1">กำไร/ขาดทุน</label>
                <input type="number" id="inputProfit" class="w-full p-2 border rounded-lg outline-none" placeholder="ติดลบใส่ -"></div>
                <div class="flex items-end"><button id="saveBtn" onclick="addData()" class="w-full bg-blue-600 text-white py-2 rounded-lg font-semibold hover:bg-blue-700 transition">บันทึก</button></div>
            </div>
        </div>

        <!-- Table -->
        <div class="bg-white rounded-2xl shadow-lg overflow-hidden">
            <table class="w-full text-left">
                <thead class="bg-slate-800 text-white text-sm">
                    <tr>
                        <th class="p-4">วันที่</th>
                        <th class="p-4 text-right">เงินทุน</th>
                        <th class="p-4 text-right">กำไร/ขาดทุน</th>
                        <th class="p-4 text-right">คงเหลือ</th>
                        <th class="p-4 text-center">จัดการ</th>
                    </tr>
                </thead>
                <tbody id="tableBody" class="divide-y divide-slate-100">
                    <tr><td colspan="5" class="p-10 text-center text-slate-400">กำลังโหลด...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        // *** สำคัญ: เอา URL ใหม่จากขั้นตอนที่ 2 มาใส่ตรงนี้ ***
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbza_MSHXfz56zkAjmY04tCWMyUd_KvwbC4Qj-l05JMLS7VHJ48ZRhRNhN-OlnjZy9oGug/exec"; 

        document.getElementById('inputDate').valueAsDate = new Date();

        async function loadData() {
            try {
                const res = await fetch(SCRIPT_URL);
                const data = await res.json();
                renderTable(data);
            } catch (e) {
                document.getElementById('tableBody').innerHTML = `<tr><td colspan="5" class="p-10 text-center text-red-500">โหลดไม่สำเร็จ ตรวจสอบการ Deploy</td></tr>`;
            }
        }

        async function addData() {
            const date = document.getElementById('inputDate').value;
            const cap = document.getElementById('inputCap').value;
            const profit = document.getElementById('inputProfit').value;
            if (!date || cap === "" || profit === "") return alert("กรุณากรอกข้อมูลให้ครบ");

            const btn = document.getElementById('saveBtn');
            btn.innerText = "กำลังบันทึก...";
            document.getElementById('inputForm').classList.add('loading');

            await fetch(SCRIPT_URL, { method: "POST", body: JSON.stringify({ action: "add", date, cap, profit }) });
            
            document.getElementById('inputProfit').value = '';
            document.getElementById('inputForm').classList.remove('loading');
            btn.innerText = "บันทึก";
            loadData();
        }

        async function deleteItem(idx) {
            if(!confirm("ลบรายการนี้?")) return;
            await fetch(SCRIPT_URL, { method: "POST", body: JSON.stringify({ action: "delete", index: idx }) });
            loadData();
        }

        function renderTable(data) {
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = '';
            let totalProfit = 0;
            let latestCap = 0;

            // สร้างสำเนาข้อมูลพร้อมจำตำแหน่งแถว (index+2 เพราะ Sheets เริ่มแถว 1 และมีหัวข้อ)
            const rows = data.map((item, i) => ({ val: item, rowIdx: i + 2 })).reverse();

            rows.forEach((item, i) => {
                const [d, cap, prof] = item.val;
                const cVal = parseFloat(cap);
                const pVal = parseFloat(prof);
                
                // แปลงวันที่ให้สวยงาม (ตัดเวลาออก)
                const dateObj = new Date(d);
                const dStr = isNaN(dateObj) ? d : dateObj.toLocaleDateString('th-TH', { day:'numeric', month:'short', year:'numeric' });

                totalProfit += pVal;
                if(i === 0) latestCap = cVal;

                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td class="p-4 text-sm text-slate-600">${dStr}</td>
                    <td class="p-4 text-right font-medium">฿${cVal.toLocaleString()}</td>
                    <td class="p-4 text-right font-bold ${pVal >= 0 ? 'text-green-600' : 'text-red-600'}">${pVal > 0 ? '+' : ''}${pVal.toLocaleString()}</td>
                    <td class="p-4 text-right font-bold">฿${(cVal + pVal).toLocaleString()}</td>
                    <td class="p-4 text-center"><button onclick="deleteItem(${item.rowIdx})" class="text-red-400 text-sm">ลบ</button></td>
                `;
                tbody.appendChild(tr);
            });

            document.getElementById('displayCap').innerText = `฿${latestCap.toLocaleString()}`;
            document.getElementById('displayProfit').innerText = `฿${totalProfit.toLocaleString()}`;
        }

        loadData();
    </script>
</body>
</html>
