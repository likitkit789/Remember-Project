<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Investment Pro Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com" rel="stylesheet">
    <style>
        body { font-family: 'Kanit', sans-serif; background-color: #f1f5f9; }
    </style>
</head>
<body class="p-4 md:p-8">
    <div class="max-w-5xl mx-auto">
        <div class="flex justify-between items-center mb-8">
            <h1 class="text-3xl font-bold text-slate-800">📊 บันทึกการลงทุน</h1>
            <button onclick="clearAllData()" class="text-xs bg-red-100 text-red-600 px-3 py-1 rounded hover:bg-red-200 transition">ล้างข้อมูลทั้งหมด</button>
        </div>
        
        <!-- Summary Dashboard -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-8">
            <div class="bg-white p-6 rounded-2xl shadow-sm border-l-4 border-blue-500">
                <p class="text-gray-500 text-sm">ทุนล่าสุด</p>
                <h2 id="displayCap" class="text-2xl font-bold text-slate-800">฿0</h2>
            </div>
            <div class="bg-white p-6 rounded-2xl shadow-sm border-l-4 border-emerald-500">
                <p class="text-gray-500 text-sm">กำไรสะสมรวม</p>
                <h2 id="displayProfit" class="text-2xl font-bold text-emerald-600">฿0</h2>
            </div>
        </div>

        <!-- Input Form -->
        <div class="bg-white p-6 rounded-2xl shadow-md mb-8">
            <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
                <div>
                    <label class="block text-sm text-gray-600 mb-1">วันที่</label>
                    <input type="date" id="inputDate" class="w-full p-2 border rounded-lg focus:ring-2 focus:ring-blue-400 outline-none">
                </div>
                <div>
                    <label class="block text-sm text-gray-600 mb-1">เงินทุน (Baht)</label>
                    <input type="number" id="inputCap" class="w-full p-2 border rounded-lg focus:ring-2 focus:ring-blue-400 outline-none" placeholder="0">
                </div>
                <div>
                    <label class="block text-sm text-gray-600 mb-1">กำไร/ขาดทุน</label>
                    <input type="number" id="inputProfit" class="w-full p-2 border rounded-lg focus:ring-2 focus:ring-blue-400 outline-none" placeholder="ติดลบใส่ -">
                </div>
                <div class="flex items-end">
                    <button onclick="addData()" class="w-full bg-blue-600 text-white py-2 rounded-lg font-semibold hover:bg-blue-700 transition shadow-lg shadow-blue-200">บันทึก</button>
                </div>
            </div>
        </div>

        <!-- Table -->
        <div class="bg-white rounded-2xl shadow-lg overflow-hidden">
            <div class="overflow-x-auto">
                <table class="w-full text-left">
                    <thead class="bg-slate-800 text-white text-sm">
                        <tr>
                            <th class="p-4">วันที่</th>
                            <th class="p-4 text-right">เงินทุน</th>
                            <th class="p-4 text-right">กำไร/ขาดทุน</th>
                            <th class="p-4 text-right">ยอดคงเหลือ</th>
                            <th class="p-4 text-center">จัดการ</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody" class="divide-y divide-slate-100">
                        <!-- Data will be loaded here -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        let myData = JSON.parse(localStorage.getItem('investLogs')) || [];

        // Set default date to today
        document.getElementById('inputDate').valueAsDate = new Date();

        function renderData() {
            const tableBody = document.getElementById('tableBody');
            tableBody.innerHTML = '';
            let totalProfit = 0;
            let lastCap = 0;

            // Sort data by date
            myData.sort((a, b) => new Date(b.date) - new Date(a.date));

            myData.forEach((item, index) => {
                const row = document.createElement('tr');
                const profitVal = parseFloat(item.profit);
                const capVal = parseFloat(item.cap);
                const balance = capVal + profitVal;
                
                totalProfit += profitVal;
                if(index === 0) lastCap = capVal;

                const profitClass = profitVal >= 0 ? 'text-emerald-600' : 'text-red-600';

                row.innerHTML = `
                    <td class="p-4 font-medium text-slate-600">${item.date}</td>
                    <td class="p-4 text-right font-medium">฿${capVal.toLocaleString()}</td>
                    <td class="p-4 text-right font-bold ${profitClass}">${profitVal > 0 ? '+' : ''}${profitVal.toLocaleString()}</td>
                    <td class="p-4 text-right font-bold text-slate-800">฿${balance.toLocaleString()}</td>
                    <td class="p-4 text-center">
                        <button onclick="deleteItem(${index})" class="text-red-400 hover:text-red-600 px-2 py-1">ลบ</button>
                    </td>
                `;
                tableBody.appendChild(row);
            });

            document.getElementById('displayCap').innerText = `฿${lastCap.toLocaleString()}`;
            document.getElementById('displayProfit').innerText = `฿${totalProfit.toLocaleString()}`;
            localStorage.setItem('investLogs', JSON.stringify(myData));
        }

        function addData() {
            const date = document.getElementById('inputDate').value;
            const cap = document.getElementById('inputCap').value;
            const profit = document.getElementById('inputProfit').value;

            if (!date || cap === "" || profit === "") return alert("กรุณากรอกข้อมูลให้ครบครับ");

            myData.push({ date, cap, profit });
            renderData();

            // Clear inputs
            document.getElementById('inputProfit').value = '';
        }

        function deleteItem(index) {
            if(confirm('ยืนยันที่จะลบรายการนี้ใช่ไหม?')) {
                myData.splice(index, 1);
                renderData();
            }
        }

        function clearAllData() {
            if(confirm('ต้องการลบข้อมูลทั้งหมดทิ้งเลยใช่ไหม?')) {
                myData = [];
                renderData();
            }
        }

        // Initial Load
        renderData();
    </script>
</body>
</html>
