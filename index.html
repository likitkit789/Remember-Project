<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>บันทึกการลงทุน</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com" rel="stylesheet">
    <style>
        body { font-family: 'Kanit', sans-serif; background-color: #f1f5f9; }
        .loading { opacity: 0.5; pointer-events: none; }
    </style>
</head>
<body class="p-4 md:p-8">
    <div class="max-w-5xl mx-auto">
        <div class="flex justify-between items-center mb-8">
            <h1 class="text-3xl font-bold text-slate-800">📊 บันทึกการลงทุน</h1>
            <div id="status" class="text-xs text-slate-400">เชื่อมต่อระบบคลาวด์แล้ว</div>
        </div>
        
        <!-- Dashboard -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-8">
            <div class="bg-white p-6 rounded-2xl shadow-sm border-l-4 border-blue-500">
                <p class="text-gray-500 text-sm">ทุนล่าสุด</p>
                <h2 id="displayCap" class="text-2xl font-bold text-slate-800">฿0</h2>
            </div>
            <div class="bg-white p-6 rounded-2xl shadow-sm border-l-4 border-emerald-500">
                <p class="text-gray-500 text-sm">กำไรสะสมรวม</p>
                <h2 id="displayProfit" class="text-2xl font-bold text-emerald-600">฿0</h2>
            </div>
        </div>

        <!-- Input Form -->
        <div class="bg-white p-6 rounded-2xl shadow-md mb-8" id="inputForm">
            <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
                <div>
                    <label class="block text-sm text-gray-600 mb-1">วันที่</label>
                    <input type="date" id="inputDate" class="w-full p-2 border rounded-lg outline-none focus:ring-2 focus:ring-blue-500">
                </div>
                <div>
                    <label class="block text-sm text-gray-600 mb-1">เงินทุน</label>
                    <input type="number" id="inputCap" class="w-full p-2 border rounded-lg outline-none focus:ring-2 focus:ring-blue-500" placeholder="0">
                </div>
                <div>
                    <label class="block text-sm text-gray-600 mb-1">กำไร/ขาดทุน</label>
                    <input type="number" id="inputProfit" class="w-full p-2 border rounded-lg outline-none focus:ring-2 focus:ring-blue-500" placeholder="ติดลบใส่ -">
                </div>
                <div class="flex items-end">
                    <button id="saveBtn" onclick="addData()" class="w-full bg-blue-600 text-white py-2 rounded-lg font-semibold hover:bg-blue-700 transition shadow-lg shadow-blue-200">บันทึกลงระบบ</button>
                </div>
            </div>
        </div>

        <!-- Table -->
        <div class="bg-white rounded-2xl shadow-lg overflow-hidden">
            <table class="w-full text-left">
                <thead class="bg-slate-800 text-white text-sm">
                    <tr>
                        <th class="p-4">วันที่</th>
                        <th class="p-4 text-right">เงินทุน</th>
                        <th class="p-4 text-right">กำไร/ขาดทุน</th>
                        <th class="p-4 text-right">ยอดคงเหลือ</th>
                        <th class="p-4 text-center">จัดการ</th>
                    </tr>
                </thead>
                <tbody id="tableBody" class="divide-y divide-slate-100">
                    <tr><td colspan="5" class="p-10 text-center text-slate-400">กำลังโหลดข้อมูลล่าสุด...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        // *** ใส่ URL ของ Google Apps Script ตรงนี้ ***
        const SCRIPT_URL = "ใส่_WEB_APP_URL_ของคุณที่นี่"; 

        document.getElementById('inputDate').valueAsDate = new Date();

        async function loadData() {
            try {
                const response = await fetch(SCRIPT_URL);
                const data = await response.json();
                renderTable(data);
            } catch (error) {
                document.getElementById('tableBody').innerHTML = `<tr><td colspan="5" class="p-10 text-center text-red-500">โหลดข้อมูลไม่สำเร็จ</td></tr>`;
            }
        }

        async function addData() {
            const date = document.getElementById('inputDate').value;
            const cap = document.getElementById('inputCap').value;
            const profit = document.getElementById('inputProfit').value;
            if (!date || cap === "" || profit === "") return alert("กรุณากรอกข้อมูลให้ครบ");

            const btn = document.getElementById('saveBtn');
            const form = document.getElementById('inputForm');
            btn.innerText = "กำลังบันทึก...";
            form.classList.add('loading');

            await fetch(SCRIPT_URL, {
                method: "POST",
                body: JSON.stringify({ action: "add", date, cap, profit })
            });

            document.getElementById('inputProfit').value = '';
            btn.innerText = "บันทึกลงระบบ";
            form.classList.remove('loading');
            loadData();
        }

        async function deleteItem(rowIndex) {
            if(!confirm("ยืนยันที่จะลบรายการนี้?")) return;
            
            const table = document.getElementById('tableBody');
            table.classList.add('loading');

            await fetch(SCRIPT_URL, {
                method: "POST",
                body: JSON.stringify({ action: "delete", index: rowIndex })
            });

            table.classList.remove('loading');
            loadData();
        }

        function renderTable(data) {
            const tableBody = document.getElementById('tableBody');
            tableBody.innerHTML = '';
            let totalProfit = 0;
            let lastCap = 0;

            // พลิกกลับเพื่อให้แถวใหม่สุดอยู่บน (ใช้ index จริงจากล่างขึ้นบนเพื่อให้ลบได้ถูกต้อง)
            const sortedData = data.map((item, index) => ({...item, originalIndex: index + 2})).reverse();

            sortedData.forEach((item, i) => {
                const [dateStr, cap, profit] = item instanceof Array ? item : [item[0], item[1], item[2]];
                const capVal = parseFloat(cap);
                const profitVal = parseFloat(profit);
                
                // จัดรูปแบบวันที่ใหม่ ตัดเวลา T17:00... ออก
                const cleanDate = new Date(dateStr).toLocaleDateString('th-TH', {
                    year: 'numeric', month: 'short', day: 'numeric'
                });

                totalProfit += profitVal;
                if(i === 0) lastCap = capVal;

                const tr = document.createElement('tr');
                const pClass = profitVal >= 0 ? 'text-emerald-600' : 'text-red-600';

                tr.innerHTML = `
                    <td class="p-4 text-slate-600 font-medium">${cleanDate}</td>
                    <td class="p-4 text-right font-medium">฿${capVal.toLocaleString()}</td>
                    <td class="p-4 text-right font-bold ${pClass}">${profitVal > 0 ? '+' : ''}${profitVal.toLocaleString()}</td>
                    <td class="p-4 text-right font-bold text-slate-800">฿${(capVal + profitVal).toLocaleString()}</td>
                    <td class="p-4 text-center">
                        <button onclick="deleteItem(${item.originalIndex})" class="text-red-400 hover:text-red-600 transition text-sm font-semibold">ลบ</button>
                    </td>
                `;
                tableBody.appendChild(tr);
            });

            document.getElementById('displayCap').innerText = `฿${lastCap.toLocaleString()}`;
            document.getElementById('displayProfit').innerText = `฿${totalProfit.toLocaleString()}`;
        }

        loadData();
    </script>
</body>
</html>
